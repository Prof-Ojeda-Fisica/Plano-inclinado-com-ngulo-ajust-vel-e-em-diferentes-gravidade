<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Física - Prof. Ojeda</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        canvas { background-color: #ecf0f1; border: 3px solid #34495e; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .controles { background: #34495e; padding: 20px; border-radius: 10px; width: 100%; max-width: 800px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card-feedback { background: #1e2124; padding: 20px; border-radius: 10px; width: 100%; max-width: 800px; margin-top: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, textarea { width: 95%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; font-size: 14px; }
        .btn-enviar { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-joinha { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .btn-enviar:hover { background: #27ae60; }
        #listaComentarios { margin-top: 20px; max-height: 200px; overflow-y: auto; background: #2f3136; padding: 10px; border-radius: 5px; }
        .comentario-item { border-bottom: 1px dashed #555; padding: 10px 0; font-size: 0.9em; }
        .user-name { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Simulador de Lançamento de Projéteis</h1>
    
    <canvas id="simulador" width="800" height="400"></canvas>

    <div class="card-feedback">
        <h3>🚀 Laboratório de Feedback</h3>
        <p>Gostou da simulação? Deixe seu comentário e um joinha para o projeto!</p>
        
        <input type="text" id="nomeAluno" placeholder="Seu nome ou matrícula">
        <textarea id="comentarioCorpo" placeholder="O que você observou no experimento?"></textarea>
        
        <div style="display: flex; align-items: center;">
            <button class="btn-enviar" onclick="enviarComentario()">Enviar Comentário</button>
            <button class="btn-joinha" onclick="darJoinha()">👍 Curtir (<span id="totalLikes">0</span>)</button>
        </div>

        <div id="listaComentarios">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // Sua configuração oficial
        const firebaseConfig = {
            apiKey: "AIzaSyCkViWCVPEffgSUm3yrUxVQb4l-L_5N9bY",
            authDomain: "simuladores-ojeda.firebaseapp.com",
            databaseURL: "https://simuladores-ojeda-default-rtdb.firebaseio.com",
            projectId: "simuladores-ojeda",
            storageBucket: "simuladores-ojeda.firebasestorage.app",
            messagingSenderId: "132201290809",
            appId: "1:132201290809:web:f115ec17d1d7ebac6e01e8"
        };

        // Inicializando o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Lógica do Simulador (Exemplo simplificado para não bugar)
        const canvas = document.getElementById('simulador');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#3498db";
        ctx.arc(50, 350, 10, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#333";
        ctx.fillText("Pronto para o disparo, Professor!", 60, 355);

        // FUNÇÕES DO FIREBASE
        function enviarComentario() {
            const nome = document.getElementById('nomeAluno').value;
            const msg = document.getElementById('comentarioCorpo').value;
            
            if(nome && msg) {
                db.ref('comentarios').push({
                    usuario: nome,
                    mensagem: msg,
                    data: new Date().toLocaleString()
                });
                document.getElementById('comentarioCorpo').value = "";
                alert("Comentário registrado no banco de dados!");
            } else {
                alert("Por favor, preencha o nome e o comentário.");
            }
        }

        function darJoinha() {
            db.ref('likes').transaction(atual => (atual || 0) + 1);
        }

        // Escutar atualizações de Likes
        db.ref('likes').on('value', (snap) => {
            document.getElementById('totalLikes').innerText = snap.val() || 0;
        });

        // Escutar e listar novos comentários
        db.ref('comentarios').on('value', (snap) => {
            const lista = document.getElementById('listaComentarios');
            lista.innerHTML = "";
            snap.forEach((item) => {
                const dado = item.val();
                lista.innerHTML = `<div class="comentario-item">
                    <span class="user-name">${dado.usuario}:</span> ${dado.mensagem}
                </div>` + lista.innerHTML;
            });
        });
    </script>
</body>
</html>
